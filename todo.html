<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やることリスト</title>
    <style>
        input[type="checkbox"] {
            display: none;
        }

        input[type="checkbox"]:checked+label {
            color: blue;
            font-weight: bold;
            text-decoration: line-through;
        }
    </style>
</head>

<body onload="init()">
    <h2>やることリスト</h2>
    <div class="todo-input-area">
        <input type="text" id="todo" placeholder="やることを入力してください" />
        <button onclick="addTodo()">追加する</button>
    </div>
    <h3>やること一覧</h3>
    <button onclick="allTodo()">全件</button>
    <button onclick="activeTodo()">未完了</button>
    <button onclick="completedTodo()">完了</button>
    <ul id="list"></ul>
    <script>
        let todos = [];
        function init() {
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                const todo = JSON.parse(localStorage.getItem(key));
                todos.push(todo);
            });
            todos.forEach(todo => {
                listTodo(todo);
            });
        };

        function updateTodos(){
            todos = [];
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                const todo = JSON.parse(localStorage.getItem(key));
                todos.push(todo);
            });
        };
        function allTodo(){
            renderTodos(todos);
        };

        function activeTodo(){
            renderTodos(todos.filter(todo => !todo.done));
        };

        function completedTodo(){
            renderTodos(todos.filter(todo => todo.done));
        }

        function renderTodos(filteredTodos){
            const list = document.getElementById('list');
            list.innerHTML="";
            filteredTodos.forEach(todo => {
                listTodo(todo);
            });
        };

        function addTodo() {
            const todo = saveTodo();
            if (todo) {
                listTodo(todo);
                document.getElementById('todo').value = "";
            }
            updateTodos();
        };

        function saveTodo() {
            const todoText = document.getElementById('todo').value;
            if (todoText !== "") {
                const todo = {
                    id: crypto.randomUUID(),
                    todo: todoText,
                    done: false
                };

                localStorage.setItem(todo.id, JSON.stringify(todo));

                return todo;
            } else {
                alert("やることを入力してください");
            }
        }

        function listTodo(todo) {
            const list = document.getElementById('list');
            const li = document.createElement("li");
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = todo.id;
            checkbox.value = todo.todo;
            checkbox.checked = todo.done;
            checkbox.onclick = function () {
                todo.done = checkbox.checked;
                localStorage.setItem(todo.id, JSON.stringify(todo));
                updateTodos();
            };
            const label = document.createElement('label');
            label.htmlFor = todo.id;
            label.appendChild(document.createTextNode(' ' + todo.todo));
            list.appendChild(li);
            li.appendChild(checkbox);
            li.appendChild(label);
            const newbutton = document.createElement("button");
            newbutton.textContent = "削除";
            newbutton.onclick = function () {
                list.removeChild(li);
                localStorage.removeItem(todo.id);
                updateTodos();
            };
            li.appendChild(newbutton);
        }
    </script>
</body>

</html>
