<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やることリスト</title>
    <style>
        input[type="checkbox"] {
            display: none;
        }

        input[type="checkbox"]:checked+label {
            color: blue;
            font-weight: bold;
            text-decoration: line-through;
        }
    </style>
</head>

<body onload="init()">
    <h2>やることリスト</h2>
    <div class="todo-input-area">
        <input type="text" id="todo" placeholder="やることを入力してください" />
        <button onclick="addTodo()">追加する</button>
    </div>
    <h3>やること一覧</h3>
    <button onclick="allTodo()">全件</button>
    <button onclick="activeTodo()">未完了</button>
    <button onclick="completedTodo()">完了</button>
    <ul id="list"></ul>
    <script>
        let todos = [];
        let filter = "all";
        function init() {
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                const todo = JSON.parse(localStorage.getItem(key));
                todos.push(todo);
            });
            todos.forEach(todo => {
                listTodo(todo);
            });
        };

        function allTodo() {
            renderTodos(todos);
            filter = "all";
        };

        function activeTodo() {
            renderTodos(todos.filter(todo => !todo.done));
            filter = "active";
        };

        function completedTodo() {
            renderTodos(todos.filter(todo => todo.done));
            filter = "completed";
        };

        function currentFilter(filter) {
            switch (filter) {
                case "all":
                    allTodo();
                    break;
                case "active":
                    activeTodo();
                    break;
                case "completed":
                    completedTodo();
                    break;
            }
        };

        function renderTodos(filteredTodos) {
            const list = document.getElementById('list');
            list.innerHTML = "";
            filteredTodos.forEach(todo => {
                listTodo(todo);
            });
        };

        function addTodo() {
            const todo = saveTodo();
            if (todo) {
                document.getElementById('todo').value = "";
                todos.push(todo);
                currentFilter(filter);
            }
        };

        function saveTodo() {
            const todoText = document.getElementById('todo').value;
            if (todoText !== "") {
                const todo = {
                    id: crypto.randomUUID(),
                    todo: todoText,
                    done: false
                };

                localStorage.setItem(todo.id, JSON.stringify(todo));

                return todo;
            } else {
                alert("やることを入力してください");
            }
        }

        function listTodo(todo) {
            const list = document.getElementById('list');
            const li = document.createElement("li");
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = todo.id;
            checkbox.value = todo.todo;
            checkbox.checked = todo.done;
            checkbox.onclick = function () {
                todo.done = checkbox.checked;
                localStorage.setItem(todo.id, JSON.stringify(todo));
                currentFilter(filter);
            };
            const label = document.createElement('label');
            label.id = 'label' + todo.id;
            label.htmlFor = todo.id;
            label.appendChild(document.createTextNode(' ' + todo.todo));
            list.appendChild(li);
            li.appendChild(checkbox);
            li.appendChild(label);
            const editBtn = document.createElement("button");
            editBtn.textContent = "編集";
            editBtn.id = 'edit' + todo.id;
            editBtn.onclick = function () {
                const oldTodo = document.getElementById(label.id);
                const editTodo = document.createElement('input');
                editTodo.type = 'text';
                editTodo.value = oldTodo.textContent;
                editTodo.id = 'input' + todo.id;
                oldTodo.replaceWith(editTodo);
                const updateBtn = document.createElement('button');
                updateBtn.innerText = '更新';
                editBtn.replaceWith(updateBtn);
                updateBtn.onclick = function () {
                    const newTodo = document.createElement('label');
                    newTodo.id = label.id;
                    newTodo.htmlFor = label.htmlFor;
                    newTodo.textContent = editTodo.value;
                    checkbox.value = newTodo.textContent;
                    const nextTodo = {
                        id: todo.id,
                        todo: newTodo.textContent,
                        done: todo.done
                    };
                    localStorage.setItem(todo.id, JSON.stringify(nextTodo));
                    const index = todos.findIndex(t => t.id === todo.id);
                    todos[index].todo = newTodo.textContent;
                    editTodo.replaceWith(newTodo);
                    updateBtn.replaceWith(editBtn);
                }
            }
            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "削除";
            deleteBtn.onclick = function () {
                localStorage.removeItem(todo.id);
                todos = todos.filter(t => t.id !== todo.id);
                currentFilter(filter);
            };
            li.appendChild(editBtn);
            li.appendChild(deleteBtn);
        }
    </script>
</body>

</html>
